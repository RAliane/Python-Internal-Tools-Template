# Use official Python image
FROM python:3.11-slim

# Set working directory
WORKDIR /app

# Copy project files
COPY pyproject.toml uv.lock ./
COPY src ./src
COPY config/nginx.config ./config
COPY run.sh ./

# Install dependencies
RUN pip install --no-cache-dir --upgrade pip \
    && pip install --no-cache-dir uv \
    && uv sync

# Expose ports
# Backend (FastAPI default) + frontend (Streamlit default)
EXPOSE 8000 8501

# Default command
# Just start backend by default; frontend can be overridden in docker-compose
CMD ["uv", "run", "fastapi", "dev"]
