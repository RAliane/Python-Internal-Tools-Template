version: "3.9"

services:
  backend:
    build: .
    container_name: powerbi3_backend
    command: uv run fastapi dev --host 0.0.0.0 --port 8000
    volumes:
      - ./src/backend:/app/src/backend
      - ./src/backend/Modules/data:/app/src/backend/Modules/data
      - ./src/backend/Modules/logs:/app/src/backend/Modules/logs
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: .
    container_name: powerbi3_frontend
    command: uv run streamlit run src/frontend/main.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./src/frontend:/app/src/frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: powerbi3_nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.config:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
